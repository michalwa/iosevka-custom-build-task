on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build-IosevkaCustom:
    runs-on: ubuntu-latest
    env:
      BUILD_PLAN: IosevkaCustom
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y ttfautohint
      - run: ./build
      - uses: actions/upload-artifact@v4
        with:
          name: IosevkaCustom-ttf
          path: Iosevka/dist/IosevkaCustom/TTF/

  build-IosevkaCustomQuasiProportional:
    runs-on: ubuntu-latest
    env:
      BUILD_PLAN: IosevkaCustomQuasiProportional
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get install -y ttfautohint
      - run: ./build
      - uses: actions/upload-artifact@v4
        with:
          name: IosevkaCustomQuasiProportional-ttf
          path: Iosevka/dist/IosevkaCustomQuasiProportional/TTF/

  release:
    needs: [build-IosevkaCustom, build-IosevkaCustomQuasiProportional]
    runs-on: ubuntu-latest
    steps:
      - name: Download IosevkaCustom
        uses: actions/download-artifact@v4
        with:
          name: IosevkaCustom-ttf
          path: ttf/IosevkaCustom
      - name: Download IosevkaCustomQuasiProportional
        uses: actions/download-artifact@v4
        with:
          name: IosevkaCustomQuasiProportional-ttf
          path: ttf/IosevkaCustomQuasiProportional
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          working_directory: ttf
          files: |
            IosevkaCustom/*
            IosevkaCustomQuasiProportional/*
